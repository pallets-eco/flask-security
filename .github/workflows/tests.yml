

name: tests
permissions:
  contents: read
on:
  push:
    branches:
      - main
      - "[0-9]+.[0-9]+.x"
  pull_request:
    branches:
      - main
      - "[0-9]+.[0-9]+.x"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - {python: '3.10', tox: 'py310-release'}
          - {python: '3.10', tox: 'py310-low'}
          - {python: '3.11', tox: 'py311-release'}
          - {python: '3.11', tox: 'py311-low'}
          - {python: '3.12', tox: 'py312-release' }
          - {python: '3.12', tox: 'py312-low' }
          - {python: '3.13', tox: 'py313-release' }
          - {python: '3.13', tox: 'py313-low' }
          - {python: '3.14', tox: 'py314-release' }
          - {python: 'pypy-3.11', tox: 'pypy311-release'}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          prune-cache: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python }}
      - name: run tests
        run: |
          uv run --locked tox -e ${{ matrix.tox }}

  lint:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
          with:
            enable-cache: true
            prune-cache: false
        - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
          with:
            python-version: "3.13"
        - name: Style, docs, mypy
          run: |
            uv run --locked tox -e style,docs,mypy

  other:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
          with:
            enable-cache: true
            prune-cache: false
        - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
          with:
            python-version: "3.13"
        - name: nobabel, nowebauthn, noauthlib, noflasksqlalchemy, async
          run: |
            uv run --locked tox -e nobabel,nowebauthn,noauthlib,noflasksqlalchemy,async
  cov:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
          with:
            enable-cache: true
            prune-cache: false
        - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
          with:
            python-version: "3.13"
        - name: Coverage
          run: |
            uv run --locked tox -e coverage
        - name: Upload coverage to Codecov
          uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
          with:
            fail_ci_if_error: true
            verbose: true
            token: ${{ secrets.codecov_token }}
  realdb:
      runs-on: ubuntu-latest

      services:
        postgres:
          image: postgres:latest
          env:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: testpw
            POSTGRES_DB: testdb
          ports:
            - 5432:5432
          options: >-
            --health-cmd pg_isready
            --health-interval 10s
            --health-timeout 5s
            --health-retries 5
      steps:
        - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
          with:
            enable-cache: true
            prune-cache: false
        - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
          with:
            python-version: "3.13"
        - name: Postgres
          run: |
            uv run --locked tox -e realpostgres -- --realdburl='postgresql://postgres:testpw@localhost:5432/testdb'
